# =====================================================================
#   Sakura Mint palette
#   bg_deep  #1a0a1f   bg0    #241530   bg1    #35203f
#   bg2      #4a3055   fg0    #ffb6c1   fg4    #c8a8b8
#   mint     #98fb98   lavender #dda0dd  sky   #add8e6
#   lemon    #fffacd   peach  #ffcba4   pink  #ffcdd5
#
#   Конфиг манго, перенесён с niri (config.kdl)
#   Важное отличие: mango использует ТЕГИ вместо воркспейсов.
#   Mod+1..9 = переключить тег, Mod+Shift+1..9 = отправить окно в тег.
#   Скроллинг колонок как в niri — используй layout "scroller".
# =====================================================================

# ─────────────────────────────────────────────
#  МОНИТОРЫ
# ─────────────────────────────────────────────
# HDMI-A-1: 1920x1080@60, позиция x=0 y=0
monitorrule=name:^HDMI-A-1$,width:1920,height:1080,refresh:60,x:0,y:0,scale:1,rr:0

# DP-1: 1920x1080@75, позиция x=1920 y=0
monitorrule=name:^DP-1$,width:1920,height:1080,refresh:75,x:1920,y:0,scale:1,rr:0

# ─────────────────────────────────────────────
#  КЛАВИАТУРА И ВВОД
# ─────────────────────────────────────────────
xkb_rules_layout=us,ru
xkb_rules_options=grp:caps_toggle

repeat_delay=200
repeat_rate=50

# focus следует за мышью (аналог focus-follows-mouse)

# курсор прыгает к сфокусированному окну (аналог warp-mouse-to-focus)
# NOTE: в манго нет встроенного warp-mouse-to-focus, но focusfollowmouse
# частично покрывает это поведение.

# ─────────────────────────────────────────────
#  КУРСОР
# ─────────────────────────────────────────────
cursor_theme=Drop-Orchid
cursor_size=22

# ─────────────────────────────────────────────
#  ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ
# ─────────────────────────────────────────────
env=ELECTRON_OZONE_PLATFORM_HINT,wayland
xwayland_persistence=1
#syncobj_enable=0
env=XDG_CURRENT_DESKTOP,mango

# ─────────────────────────────────────────────
#  АВТОЗАПУСК
# ─────────────────────────────────────────────
exec-once=waybar
exec-once=awww-daemon
exec-once=awww img /home/void/Pictures/Wallpapers/purpleWallpaper.png
exec-once=pipewire
exec-once=pipewire-pulse
exec-once=wireplumber
exec-once=dunst
exec-once=xwayland-satellite

# ─────────────────────────────────────────────
#  ВНЕШНИЙ ВИД (THEMING)
#  Цвета в формате 0xRRGGBBFF
# ─────────────────────────────────────────────
# Ширина бордера (было 2px в niri)
borderpx=2

# Активный бордер: lavender #dda0dd
focuscolor=0xdda0ddff

# Неактивный бордер: bg1 #35203f
bordercolor=0x35203fff

# Urgent бордер: pink #ffcdd5
urgentcolor=0xffcdd5ff

# Внутренние и внешние гапы
gappih=6
gappiv=6
gappoh=6
gappov=6

# ─────────────────────────────────────────────
#  ЭФФЕКТЫ ОКОН
# ─────────────────────────────────────────────
# Скруглённые углы (было 6 в niri)
border_radius=0

# Прозрачность (было opacity 0.95 для всех окон)
# focused_opacity=0.95
# unfocused_opacity=0.95

# Тени (аналог shadow { on } из niri)
shadows=1
shadow_only_floating=0
shadows_size=20
shadows_blur=20
shadows_position_x=0
shadows_position_y=4
# shadowscolor: bg_deep #1a0a1f с ~60% прозрачностью
shadowscolor=0x1a0a1f99
focus_on_activate=1
sloppyfocus=1
warpcursor=1
hotspot_overview=0
enable_hotarea = 0

# ─────────────────────────────────────────────
#  АНИМАЦИИ
# ─────────────────────────────────────────────

animations=1
layer_animations=1

# Типы анимаций: slide, zoom, fade, none
animation_type_open=zoom
animation_type_close=fade
layer_animation_type_open=slide
layer_animation_type_close=slide

# Настройки Fade (затухание)
animation_fade_in=1
animation_fade_out=1
# Начинаем с 40% прозрачности для мягкого появления
fadein_begin_opacity=0.4
fadeout_begin_opacity=0.4

# Настройки Zoom (для открытия окон)
# Окно будет "выплывать" из центра, увеличиваясь с 60% до 100%
zoom_initial_ratio=0.6
zoom_end_ratio=1.0

# Длительности (в миллисекундах)
# Делаем чуть медленнее стандарта для эстетики
animation_duration_move=450
animation_duration_open=350
animation_duration_tag=400
animation_duration_close=250
animation_duration_focus=200

# Кастомные кривые Безье (Плавный ease-out)
# Эта кривая дает быстрый старт и очень мягкое замедление в конце
animation_curve_open=0.22,1.0,0.36,1.0
animation_curve_move=0.22,1.0,0.36,1.0
animation_curve_tag=0.22,1.0,0.36,1.0
animation_curve_close=0.5,0.0,0.75,0.0
animation_curve_focus=0.42,0.0,0.58,1.0
animation_curve_opafadein=0.22,1.0,0.36,1.0
animation_curve_opafadeout=0.5,0.5,0.5,0.5

# Направление анимации тегов (1 - горизонтально, как в niri)
tag_animation_direction=1

# ─────────────────────────────────────────────
#  РАСКЛАДКА ОКОН
#  "scroller" — ближайший аналог niri (горизонтальный скроллинг колонок)
# ─────────────────────────────────────────────
# Пресеты ширины (аналог preset-column-widths: 1/3, 1/2, 2/3)
#scroller_proportion_preset=0.33333,0.5,0.66667
scroller_proportion_preset=0.66667,0.5,0.33333

# Дефолтная ширина нового окна — 50% (аналог default-column-width proportion 0.5)
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_overspread=1

# Цикл по раскладкам через Mod+W (переопределён ниже как toggle tabbed,
# но scroller — основная раскладка)
circle_layout=scroller,tile,grid,deck,center_tile,fair

# ─────────────────────────────────────────────
#  СКРИНШОТЫ
# ─────────────────────────────────────────────
# В манго нет встроенного скриншота — используем grim+slurp через бинды ниже.
# screenshot_path задаётся в командах spawn.

# ─────────────────────────────────────────────
#  БИНДИНГИ КЛАВИШ
#  Mod = SUPER (Win-клавиша), как в niri
# ─────────────────────────────────────────────

# --- Системные ---
bind=SUPER+SHIFT,e,quit
bind=SUPER+SHIFT,p,spawn,mmsg -d toggle_monitor,eDP-1

# Перезагрузить конфиг (аналог Mod+Shift+R в mangoWC)
bind=SUPER+SHIFT,p,reload_config

# Показать/скрыть overview (аналог toggle-overview)
bind=SUPER,o,toggleoverview

# --- Запуск приложений ---
bind=SUPER,t,spawn,foot
bind=SUPER,d,spawn,rofi -show run

# --- Скриншоты ---
# Print        -> скриншот региона (grim+slurp, аналог niri screenshot)
# bind=NONE,Print,spawn_shell,grim -g "$(slurp)" ~/Pictures/Screenshots/Screenshot\ from\ $(date\ '+%Y-%m-%d\ %H-%M-%S').png
# # Ctrl+Print   -> скриншот всего экрана
# bindl=CTRL,Print,spawn_shell,grim ~/Pictures/Screenshots/Screenshot\ from\ $(date\ '+%Y-%m-%d\ %H-%M-%S').png
# # Alt+Print    -> скриншот активного окна
# bind=ALT,Print,spawn_shell,grim -g "$(mmsg -g -c | awk '{print $1}')" ~/Pictures/Screenshots/Screenshot\ from\ $(date\ '+%Y-%m-%d\ %H-%M-%S').png

# Print        -> Весь экран
bind=NONE,Print,spawn,$HOME/.config/mango/scripts/screenshot/screenshot.sh fullscreen

# Shift+Print  -> Выбор области (с проверкой на отмену)
bind=SHIFT,Print,spawn,$HOME/.config/mango/scripts/screenshot/screenshot.sh region

# Ctrl+Print   -> Активное окно (использует mmsg)
bind=CTRL,Print,spawn,$HOME/.config/mango/scripts/screenshot/screenshot.sh window

# Super+Print  -> Скриншот с аннотациями (через satty)
bind=SUPER,Print,spawn,$HOME/.config/mango/scripts/screenshot/screenshot.sh annotate

# Super+Shift+S -> Заморозка экрана + выбор области (удобно для видео/анимаций)
bind=SUPER+SHIFT,s,spawn,$HOME/.config/mango/scripts/screenshot/screenshot.sh freeze-region

# --- Медиа: громкость ---
bindl=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+
bindl=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bindl=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# --- Медиа: управление плеером ---
bindl=NONE,XF86AudioPlay,spawn,playerctl play-pause
bindl=NONE,XF86AudioStop,spawn,playerctl stop
bindl=NONE,XF86AudioPrev,spawn,playerctl previous
bindl=NONE,XF86AudioNext,spawn,playerctl next

# --- Яркость ---
bindl=NONE,XF86MonBrightnessUp,spawn,brightnessctl --class=backlight set +10%
bindl=NONE,XF86MonBrightnessDown,spawn,brightnessctl --class=backlight set 10%-

# --- Управление окнами ---
bind=SUPER,q,killclient
bind=SUPER,v,togglefloating
bind=SUPER+SHIFT,v,focuslast
bind=SUPER,f,togglemaximizescreen
bind=SUPER+SHIFT,f,togglefullscreen

# --- Фокус (hjkl) ---
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right

# --- Перемещение окон (Shift+hjkl) ---
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

# --- Фокус монитора (Ctrl+hjkl) ---
bind=SUPER+CTRL,h,focusmon,left
bind=SUPER+CTRL,j,focusmon,down
bind=SUPER+CTRL,k,focusmon,up
bind=SUPER+CTRL,l,focusmon,right

# --- Переместить окно на монитор (Ctrl+Shift+hjkl) ---
bind=SUPER+CTRL+SHIFT,h,tagmon,left
bind=SUPER+CTRL+SHIFT,j,tagmon,down
bind=SUPER+CTRL+SHIFT,k,tagmon,up
bind=SUPER+CTRL+SHIFT,l,tagmon,right

# --- Переключение тегов (аналог воркспейсов в niri) ---
# Mod+1..9 = перейти на тег
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

# Mod+Shift+1..9 = отправить окно на тег
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# Mod+U/I = предыдущий/следующий тег (аналог focus-workspace-down/up)
bind=SUPER,u,viewtoright
bind=SUPER,i,viewtoleft
bind=SUPER+SHIFT,u,tagtoright
bind=SUPER+SHIFT,i,tagtoleft

# --- Скроллер: ширина колонок ---
# Mod+R = цикл по пресетам ширины (аналог switch-preset-column-width)
bind=SUPER,r,switch_proportion_preset
# Mod+Minus/Equal = уменьшить/увеличить ширину
bind=SUPER,minus,spawn,mmsg -d switch_proportion_preset
bind=SUPER,equal,spawn,mmsg -d switch_proportion_preset
# Mod+Shift+R — войти в режим ресайза
bind=SUPER+SHIFT,R,setkeymode,resize

keymode=resize
# hjkl — изменить размер
bind=NONE,h,resizewin,-30,0
bind=NONE,l,resizewin,+30,0
bind=NONE,k,resizewin,0,-30
bind=NONE,j,resizewin,0,+30
# В tile режиме — двигать границу master/stack
bind=NONE,h,setmfact,-0.05
bind=NONE,l,setmfact,+0.05
# Escape — выйти из режима
bind=NONE,Escape,setkeymode,default
bind=NONE,Return,setkeymode,default

keymode=default

bind=SUPER+ALT,h,resizewin,-30,0
bind=SUPER+ALT,l,resizewin,+30,0
bind=SUPER+ALT,k,resizewin,0,-30
bind=SUPER+ALT,j,resizewin,0,+30

# --- Перемещение колонки внутри/снаружи стека скроллера ---
# Аналог consume-or-expel-window-left/right из niri
bind=SUPER,bracketleft,scroller_stack,left
bind=SUPER,bracketright,scroller_stack,right

# --- Переключение раскладки ---
bind=SUPER,w,switch_layout

# --- Колёсико мыши для навигации ---
# Mod+ScrollDown/Up = следующий/предыдущий тег
axisbind=SUPER,DOWN,viewtoright
axisbind=SUPER,UP,viewtoleft
axisbind=SUPER+SHIFT,DOWN,tagtoright
axisbind=SUPER+SHIFT,UP,tagtoleft
