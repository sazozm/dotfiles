#   bg_deep  #1a0a1f   bg0    #241530   bg1    #35203f
#   bg2      #4a3055   fg0    #ffb6c1   fg4    #c8a8b8
#   mint     #98fb98   lavender #dda0dd  sky   #add8e6
#   lemon    #fffacd   peach  #ffcba4   pink  #ffcdd5

# =============================================
#  Input
# =============================================
xkb_rules_layout=us,ru
xkb_rules_options=grp:caps_toggle

repeat_delay=200
repeat_rate=50
numlockon=0

monitorrule=name:^HDMI-A-1$,width:1920,height:1080,refresh:60,x:0,y:0,scale:1,rr:0

monitorrule=name:^DP-1$,width:1920,height:1080,refresh:75,x:1920,y:0,scale:1,rr:0

# =============================================
#  Wayland
# =============================================
env=ELECTRON_OZONE_PLATFORM_HINT,wayland
xwayland_persistence=1
#syncobj_enable=0
env=XDG_CURRENT_DESKTOP,mango

# =============================================
#  AutoStart
# =============================================
exec-once=waybar
exec-once=awww-daemon
exec-once=awww img ~/dotfiles/wallpapers/Pictures/Wallpapers/purpleWallpaper.png
exec-once=pipewire
exec-once=pipewire-pulse
exec-once=wireplumber
exec-once=dunst
exec-once=xwayland-satellite

# =============================================
#  Theme
# =============================================

borderpx=2

focuscolor=0xdda0ddff

bordercolor=0x35203fff

urgentcolor=0xffcdd5ff

gappih=6
gappiv=6
gappoh=6
gappov=6

border_radius=0

blur=0

# focused_opacity=0.95
# unfocused_opacity=0.95

cursor_theme=Drop-Orchid
cursor_size=22

shadows=1
shadow_only_floating=0
shadows_size=20
shadows_blur=20
shadows_position_x=0
shadows_position_y=4
# shadowscolor: bg_deep #1a0a1f
shadowscolor=0x1a0a1f99

# =============================================
#  Animations
# =============================================

animations=1
layer_animations=1

animation_type_open=zoom
animation_type_close=fade
layer_animation_type_open=slide
layer_animation_type_close=slide

animation_fade_in=1
animation_fade_out=1
fadein_begin_opacity=0.4
fadeout_begin_opacity=0.4

zoom_initial_ratio=0.6
zoom_end_ratio=1.0

animation_duration_move=450
animation_duration_open=350
animation_duration_tag=400
animation_duration_close=250
animation_duration_focus=200

animation_curve_open=0.22,1.0,0.36,1.0
animation_curve_move=0.22,1.0,0.36,1.0
animation_curve_tag=0.22,1.0,0.36,1.0
animation_curve_close=0.5,0.0,0.75,0.0
animation_curve_focus=0.42,0.0,0.58,1.0
animation_curve_opafadein=0.22,1.0,0.36,1.0
animation_curve_opafadeout=0.5,0.5,0.5,0.5

tag_animation_direction=1

# =============================================
#  Layouts
# =============================================

circle_layout=scroller,dwindle,grid,center_tile

# --- Scroller ---

scroller_structs=5
scroller_proportion_preset=0.66667,0.5,0.33333,1
scroller_default_proportion=0.5
scroller_default_proportion_single=1
scroller_focus_center=0
scroller_prefer_center=0
scroller_prefer_overspread=1
scroller_ignore_proportion_single=1


# --- Dwindle ---

dwindle_split_ratio=0.5
dwindle_smart_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_drop_simple_split=1

# --- Overview ---

enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=10

# --- All ---
focus_on_activate=1
sloppyfocus=1
warpcursor=1
axis_bind_apply_timeout=10
no_border_when_single=0

# =============================================
#  Binds 
# =============================================

# --- System ---
bind=SUPER+SHIFT,e,quit
bind=SUPER+SHIFT,p,spawn,mmsg -d toggle_monitor,eDP-1

# --- Reload ---
bind=SUPER+SHIFT,p,reload_config

# --- Overview ---
bind=SUPER,o,toggleoverview

# --- Spawn ---
bind=SUPER,t,spawn,foot
bind=SUPER,d,spawn,rofi -show run

# --- Screenshots ---

# Print        -> All screen
bind=NONE,Print,spawn,$HOME/.config/mango/scripts/screenshot/screenshot.sh fullscreen

# Shift+Print  -> Area
bind=SHIFT,Print,spawn,$HOME/.config/mango/scripts/screenshot/screenshot.sh region

# Ctrl+Print   -> Window Now
bind=CTRL,Print,spawn,$HOME/.config/mango/scripts/screenshot/screenshot.sh window

# Super+Print  -> Paint
bind=SUPER,Print,spawn,$HOME/.config/mango/scripts/screenshot/screenshot.sh annotate

# --- Volume ---
bindl=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+
bindl=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bindl=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# --- Windows ---
bind=SUPER,q,killclient
bind=SUPER,v,togglefloating
bind=SUPER+SHIFT,v,focuslast
bind=SUPER,f,togglemaximizescreen
bind=SUPER+SHIFT,f,togglefullscreen

# --- Focus ---
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right

# --- Change place of windows ---
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

# --- Change monitor focus ---
bind=SUPER+CTRL,h,focusmon,left
bind=SUPER+CTRL,j,focusmon,down
bind=SUPER+CTRL,k,focusmon,up
bind=SUPER+CTRL,l,focusmon,right

# --- Change place window on monitors ---
bind=SUPER+CTRL+SHIFT,h,tagmon,left
bind=SUPER+CTRL+SHIFT,j,tagmon,down
bind=SUPER+CTRL+SHIFT,k,tagmon,up
bind=SUPER+CTRL+SHIFT,l,tagmon,right

# --- Workspaces ---
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

bind=SUPER,u,viewtoright
bind=SUPER,i,viewtoleft
bind=SUPER+SHIFT,u,tagtoright
bind=SUPER+SHIFT,i,tagtoleft

# --- Scroller ---
bind=SUPER,r,switch_proportion_preset
bind=SUPER,minus,spawn,mmsg -d switch_proportion_preset
bind=SUPER,equal,spawn,mmsg -d switch_proportion_preset
bind=SUPER+SHIFT,R,setkeymode,resize

# --- Resize ---

keymode=resize

bind=NONE,h,resizewin,-30,0
bind=NONE,l,resizewin,+30,0
bind=NONE,k,resizewin,0,-30
bind=NONE,j,resizewin,0,+30

bind=NONE,h,setmfact,-0.05
bind=NONE,l,setmfact,+0.05

bind=NONE,Escape,setkeymode,default
bind=NONE,Return,setkeymode,default

keymode=default

bind=SUPER+ALT,h,resizewin,-30,0
bind=SUPER+ALT,l,resizewin,+30,0
bind=SUPER+ALT,k,resizewin,0,-30
bind=SUPER+ALT,j,resizewin,0,+30

bind=SUPER,bracketleft,scroller_stack,left
bind=SUPER,bracketright,scroller_stack,right

# --- Change layout ---
# bind=SUPER,w,switch_layout
bind=SUPER,e,setlayout, dwindle
bind=SUPER,w,setlayout, scroller
bind=SUPER,s,setlayout, grid
bind=SUPER,a,setlayout, center_tile

axisbind=SUPER,DOWN,viewtoright
axisbind=SUPER,UP,viewtoleft
axisbind=SUPER+SHIFT,DOWN,tagtoright
axisbind=SUPER+SHIFT,UP,tagtoleft
