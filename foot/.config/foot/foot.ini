# -*- conf -*-

font=monospace:size=15

[cursor]
style=beam
blink=yes
beam-thickness=0.5

[touch]
long-press-delay=250

[colors-dark]
alpha=0.9
background=1a0a1f
foreground=ffb6c1

## Normal/regular colors (color palette 0-7)
regular0=1a0a1f  # black (deep plum bg)
regular1=ffb6c1  # soft pink
regular2=98fb98  # mint green
regular3=fffacd  # lemon chiffon
regular4=add8e6  # light blue / sky
regular5=dda0dd  # plum / lavender
regular6=afeeee  # pale turquoise
regular7=f5f5f5  # white smoke

## Bright colors (color palette 8-15)
bright0=35203f   # bright black (bg1)
bright1=ffcdd5   # bright pink
bright2=b8ffc0   # bright mint
bright3=fff5a0   # bright lemon
bright4=c5e8f5   # bright sky
bright5=edc8f0   # bright lavender
bright6=c5f5f5   # bright turquoise
bright7=ffffff   # white

[colors-light]
# Not used

[key-bindings]
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste

